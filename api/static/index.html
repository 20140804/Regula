<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regula 企业仪表盘</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .header h1 { color: #1a1a2e; font-size: 28px; }
        .header .badge {
            background: #8e44ad;
            color: white;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #1a1a2e;
        }
        .stat-card .label {
            color: #7f8c8d;
            font-size: 14px;
            margin-top: 4px;
        }
        .stat-card.fatal .number { color: #e74c3c; }
        .stat-card.serious .number { color: #e67e22; }
        .stat-card.normal .number { color: #f1c40f; }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #1a1a2e;
        }
        .table-wrap {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #f8f9fa;
            text-align: left;
            padding: 12px 16px;
            font-weight: 600;
            color: #2c3e50;
            border-bottom: 2px solid #e9ecef;
        }
        td {
            padding: 12px 16px;
            border-bottom: 1px solid #e9ecef;
        }
        .severity-badge {
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }
        .severity-badge.fatal { background: #e74c3c; }
        .severity-badge.serious { background: #e67e22; }
        .severity-badge.normal { background: #f1c40f; color: #333; }
        .empty { text-align: center; color: #999; padding: 40px 0; }
        .login-form {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .login-form h2 { margin-bottom: 20px; text-align: center; }
        .login-form input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .login-form button {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .login-form button:hover { background: #219a52; }
        .login-form .error {
            color: #e74c3c;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
<div id="app">
    <div id="loginSection" class="login-form">
        <h2>🔐 登录 Regula 仪表盘</h2>
        <input type="text" id="username" placeholder="用户名 (admin)" value="admin">
        <input type="password" id="password" placeholder="密码 (admin123)" value="admin123">
        <button onclick="login()">登录</button>
        <div id="loginError" class="error hidden"></div>
    </div>

    <div id="dashboardSection" class="container hidden">
        <div class="header">
            <h1>🦅 Regula 企业仪表盘</h1>
            <span class="badge">Enterprise v1.2.0</span>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><div class="number" id="totalScans">0</div><div class="label">总扫描数</div></div>
            <div class="stat-card fatal"><div class="number" id="totalViolations">0</div><div class="label">总违规数</div></div>
            <div class="stat-card fatal"><div class="number" id="fatalCount">0</div><div class="label">致命违规</div></div>
            <div class="stat-card serious"><div class="number" id="seriousCount">0</div><div class="label">严重违规</div></div>
        </div>

        <div class="section-title">📋 最近扫描记录</div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>文件名</th><th>违规数</th><th>致命</th><th>严重</th><th>一般</th><th>时间</th></tr></thead>
                <tbody id="recentScans"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let token = '';

    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('loginError');
        try {
            const res = await fetch('/api/v1/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                token = data.access_token;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                errorEl.classList.add('hidden');
                loadDashboard();
            } else {
                errorEl.textContent = data.error || '登录失败';
                errorEl.classList.remove('hidden');
            }
        } catch (e) {
            errorEl.textContent = '网络错误';
            errorEl.classList.remove('hidden');
        }
    }

    async function loadDashboard() {
        try {
            const res = await fetch('/api/v1/dashboard/stats', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            document.getElementById('totalScans').textContent = data.total_scans || 0;
            document.getElementById('totalViolations').textContent = data.total_violations || 0;
            document.getElementById('fatalCount').textContent = data.fatal_violations || 0;
            document.getElementById('seriousCount').textContent = data.serious_violations || 0;

            const tbody = document.getElementById('recentScans');
            tbody.innerHTML = '';
            if (data.recent_scans && data.recent_scans.length > 0) {
                data.recent_scans.forEach(s => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${s.filename || '未命名'}</td>
                        <td>${s.total_violations || 0}</td>
                        <td><span class="severity-badge fatal">${s.fatal_count || 0}</span></td>
                        <td><span class="severity-badge serious">${s.serious_count || 0}</span></td>
                        <td><span class="severity-badge normal">${s.normal_count || 0}</span></td>
                        <td>${s.scanned_at ? new Date(s.scanned_at).toLocaleString() : '-'}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="6" class="empty">暂无扫描记录</td></tr>';
            }
        } catch (e) {
            console.error('加载仪表盘失败:', e);
        }
    }

    // 自动登录（如果已登录）
    if (window.location.search.includes('token=')) {
        token = new URLSearchParams(window.location.search).get('token');
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('dashboardSection').classList.remove('hidden');
        loadDashboard();
    }
</script>
</body>
</html>
